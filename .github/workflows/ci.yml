name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: [ "3.2", "3.3", "3.4", "4.0" ]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake test

  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rubocop

  # Drives the real editor in Chromium through the same import map an
  # importmap-rails host uses (lexxy.js from the lexxy gem + the vendored
  # extension). Covers the {{ prompt insert and the toolbar dropdown.
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npx playwright install chromium
      - run: npm run test:browser

  # The vendored JS and CSS must always match src/. Rebuild and fail if a
  # commit edited src/ without running npm run build.
  vendored-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run build
      - run: git diff --exit-code vendor/
