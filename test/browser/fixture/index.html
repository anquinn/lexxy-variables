<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>lexxy-variables browser fixture</title>
  <!-- The same pins the engine provides to importmap-rails hosts: "lexxy" and
       "@37signals/lexxy" resolve to the one lexxy.js the lexxy gem serves, and
       "lexxy-variables" resolves to the vendored extension. -->
  <script type="importmap">
    {
      "imports": {
        "lexxy": "/lexxy.js",
        "@37signals/lexxy": "/lexxy.js",
        "lexxy-variables": "/vendor/javascript/lexxy_variables.js"
      }
    }
  </script>
  <link rel="stylesheet" href="/lexxy-css/lexxy.css">
  <link rel="stylesheet" href="/vendor/stylesheets/lexxy_variables.css">
  <script type="module">
    import VariableExtension from "lexxy-variables"
    import * as Lexxy from "@37signals/lexxy"

    Lexxy.configure({ global: { extensions: [ VariableExtension ] } })
  </script>
</head>
<body>
  <!-- The editor + prompt markup a Rails host renders via rich_text_area and
       the lexxy_variables_prompt helper (app/views/lexxy_variables/_prompt.html.erb). -->
  <lexxy-editor name="content" class="lexxy-content">
    <lexxy-prompt trigger="{{" name="variable" empty-results="No variables">
      <lexxy-prompt-item search="Company company" sgid="sgid-company">
        <template type="menu">
          <span class="lexxy-variables-option">
            <span class="lexxy-variables-option__header">
              <span class="lexxy-variables-option__name">Company</span>
            </span>
            <code class="lexxy-variables-option__code">{{ company }}</code>
          </span>
        </template>
        <template type="editor" content-type="application/vnd.actiontext.variable"><span class="lexxy-variable" data-lexxy-key="company">Company</span></template>
      </lexxy-prompt-item>
      <lexxy-prompt-item search="First name first_name" sgid="sgid-first-name">
        <template type="menu">
          <span class="lexxy-variables-option">
            <span class="lexxy-variables-option__header">
              <span class="lexxy-variables-option__name">First name</span>
            </span>
            <code class="lexxy-variables-option__code">{{ first_name }}</code>
          </span>
        </template>
        <template type="editor" content-type="application/vnd.actiontext.variable"><span class="lexxy-variable" data-lexxy-key="first_name">First name</span></template>
      </lexxy-prompt-item>
    </lexxy-prompt>
  </lexxy-editor>
</body>
</html>
